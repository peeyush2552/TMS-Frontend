<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Reset Password</h1>
      <p>Enter your new password below</p>
    </div>

    <div class="error-message" *ngIf="invalidToken">
      <span class="icon">✗</span>
      Invalid or expired reset link. Please request a new one.
      <a routerLink="/forgot-password" class="inline-link">Click here</a>
    </div>

    <form (ngSubmit)="resetPassword()" class="auth-form" *ngIf="!invalidToken">
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input
          type="password"
          id="newPassword"
          name="newPassword"
          [(ngModel)]="newPassword"
          placeholder="Enter new password"
          required
          minlength="6"
          [disabled]="loading"
        />
        <small class="hint">Minimum 6 characters</small>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          placeholder="Confirm new password"
          required
          minlength="6"
          [disabled]="loading"
        />
      </div>

      <div class="success-message" *ngIf="successMessage">
        <span class="icon">✓</span>
        {{ successMessage }}
      </div>

      <div class="error-message" *ngIf="errorMessage">
        <span class="icon">✗</span>
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Reset Password</span>
        <span *ngIf="loading">Resetting...</span>
      </button>

      <div class="auth-footer">
        <a routerLink="/login" class="link">Back to Login</a>
      </div>
    </form>
  </div>
</div>
